# Render Blueprint Manifest - Fleet Management System

databases:
  # 1. Managed PostgreSQL Database
  - name: fleet-db-muaz
    databaseName: fleet_db_muaz
    user: fleet_user_muaz
    plan: free

services:
  # 2. Managed Redis/Valkey Cache & Queue
  - type: redis
    name: fleet-redis-muaz
    plan: free

  # 3. Backend API Service (Runs Django, Celery Worker, and Celery Beat Scheduler)
  - type: web
    name: fleet-backend-muaz
    rootDir: backend
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && celery -A config worker -l info & celery -A config beat -l info & gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-muaz
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fleet-redis-muaz
          property: connectionString
      - key: OCR_PROVIDER
        value: "mock"
      - key: COMPANY_COMMISSION_PERCENTAGE
        value: "15.0"

  # 4. Admin Panel Web Client (React + Vite Static Site)
  - type: web
    name: fleet-admin-panel-muaz
    plan: free
    runtime: static
    buildCommand: "cd admin-frontend && npm install && npm run build"
    staticPublishPath: "admin-frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://fleet-backend-muaz.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
