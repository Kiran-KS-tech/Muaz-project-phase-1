# Render Blueprint Manifest - Fleet Management System

databases:
  # 1. Managed PostgreSQL Database
  - name: fleet-db
    plan: free
    ipAllowList: [] # only allow internal services

services:
  # 2. Managed Redis Cache & Queue
  - type: redis
    name: fleet-redis
    plan: free
    ipAllowList: []

  # 3. Backend API Service
  - type: web
    name: fleet-backend
    rootDirectory: backend
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: REDIS_URL
        fromConnection:
          type: redis
          name: fleet-redis
          property: connectionString
      - key: OCR_PROVIDER
        value: "mock"
      - key: COMPANY_COMMISSION_PERCENTAGE
        value: "15.0"

  # 4. Celery Asynchronous Task Worker
  - type: worker
    name: fleet-worker
    rootDirectory: backend
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: REDIS_URL
        fromConnection:
          type: redis
          name: fleet-redis
          property: connectionString
      - key: OCR_PROVIDER
        value: "mock"

  # 5. Celery Beat Scheduler
  - type: worker
    name: fleet-beat
    rootDirectory: backend
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: REDIS_URL
        fromConnection:
          type: redis
          name: fleet-redis
          property: connectionString
      - key: OCR_PROVIDER
        value: "mock"

  # 6. Admin Panel Web Client (React + Vite)
  - type: web
    name: fleet-admin-panel
    rootDirectory: admin-frontend
    plan: free
    runtime: static
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    envVars:
      - key: VITE_API_URL
        value: "https://fleet-backend.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
