# Render Blueprint Manifest - Fleet Management System

databases:
  # 1. Managed PostgreSQL Database
  - name: fleet-db
    plan: free

services:
  # 2. Managed Redis/Valkey Cache & Queue
  - type: keyvalue
    name: fleet-redis
    plan: free

  # 3. Backend API Service (Runs Django, Celery Worker, and Celery Beat Scheduler)
  - type: web
    name: fleet-backend
    rootDirectory: backend
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && celery -A config worker -l info & celery -A config beat -l info & gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: fleet-redis
          property: connectionString
      - key: OCR_PROVIDER
        value: "mock"
      - key: COMPANY_COMMISSION_PERCENTAGE
        value: "15.0"

  # 4. Admin Panel Web Client (React + Vite)
  - type: web
    name: fleet-admin-panel
    rootDirectory: admin-frontend
    plan: free
    runtime: static
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    envVars:
      - key: VITE_API_URL
        value: "https://fleet-backend.onrender.com"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
